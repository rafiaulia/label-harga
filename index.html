<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Samoro — Generator Label Harga</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=3" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Manrope:wght@800&display=swap" rel="stylesheet" />
</head>
<body>
<div class="screen">

  <!-- HEADER -->
  <header class="header">
    <div class="header-logo" id="headerLogoWrap"></div>
    <div class="header-title">
      Generator Label Harga Thermal
      <strong>SAMORO</strong>
    </div>
  </header>


  <div> <a href="notatransfer.html" class="btn">NOTA TRANSFER</a> </div>
  <!-- TWO-COLUMN FORM + LIST -->
  <div class="two-col">

    <!-- FORM PANEL -->
    <div class="panel">
      <div class="panel-head">✦ Input Produk Baru</div>
      <div class="panel-body">
        <div class="field">
          <label>Nama Produk</label>
          <input type="text" id="inp-headline1" placeholder="contoh: PEPSODENT" maxlength="40" />
        </div>
        
        <div class="field">
          <label>Harga (Rp)</label>
          <input type="number" id="inp-harga" placeholder="contoh: 38000" min="0" />
        </div>
        <button class="btn btn-primary" id="btn-tambah" onclick="tambahProduk()">
          + Tambah Produk
        </button>
        <div class="counter">
          Produk: <span id="counter-badge">0</span> / 10
        </div>
      </div>
    </div>

    <!-- LIST PANEL -->
    <div class="panel">
      <div class="panel-head">☰ Daftar Produk</div>
      <div id="product-list" class="product-list">
        <div class="empty-state" id="empty-state">Belum ada produk ditambahkan.</div>
      </div>
    </div>

  </div>

  <!-- ACTION BAR -->
  <div class="action-bar">
    <button class="btn-process" id="btn-proses" onclick="prosesCetak()" disabled>
      ▶ Proses &amp; Generate
    </button>
    <button class="btn-print" id="btn-cetak" onclick="window.print()" style="display:none;">
      🖨 Cetak
    </button>
    <button class="btn-print" id="btn-export" onclick="exportAsPNG()" style="display:none;">
      📷 Simpan PNG
    </button>
    <button class="btn-print" id="btn-reset-nota" onclick="resetNota()" style="display:none;">
      ✕ Hapus
    </button>
  </div>

  <!-- NOTA PREVIEW -->
  <section class="nota-section" id="nota-section">
    <div class="nota-section-head">
      <h2>Preview Nota — Siap Cetak</h2>
    </div>
    <div class="nota-scroll-wrap">
      <div class="nota-wrap" id="nota-wrap"></div>
    </div>
  </section>

</div>

<script src="app.js?v=3"></script>
</body>
</html>
